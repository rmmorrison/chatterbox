name: Publish Docker Image

on:
  release:
    types:
      - published

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Java 11
        uses: actions/setup-java@v1
        with:
          java-version: 11
      - name: Remove -SNAPSHOT from version number
        run: ./mvnw --batch-mode versions:set -DremoveSnapshot -DgenerateBackupPoms=false
      - name: Build with Maven
        run: ./mvnw --batch-mode --update-snapshots package -DskipTests
      - name: Save Artifact
        run: mkdir staging && cp target/chatterbox-*.jar staging
      - name: Build Dockerfile
        run: ./mvnw --batch-mode mn:dockerfile -Dpackaging=docker
      - name: Read Version from POM
        run: echo "POM_VERSION=$(./mvnw help:evaluate -Dexpression='project.version' -q -DforceStdout)" >> $GITHUB_ENV
      - name: Move to Target Directory
        run: cd target
      - name: Build and Push Docker Image to GitHub Packages
        uses: docker/build-push-action@v2
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: docker.pkg.github.com
          repository: ${{ github.repository }}
          tags: ${{ github.repository }}:latest,${{ github.repository }}:${{ env.POM_VERSION }}
      - name: Save Dockerfile
        run: cd .. && cp target/Dockerfile staging
      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: JAR with dependencies and Dockerfile
          path: staging
