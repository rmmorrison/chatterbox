name: Deploy Traefik

# Pushes the shared Traefik compose file to the host. Idempotent — the host's
# .env (with LETSENCRYPT_EMAIL) and any existing letsencrypt/ cert store are
# left untouched. Run this once per host, then re-run after edits to
# docker-compose.traefik.yml.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: deploy-traefik
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: traefik
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy compose file to host
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_TRAEFIK }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/id_ed25519 docker-compose.traefik.yml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/docker-compose.traefik.yml"

      - name: Apply compose
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_TRAEFIK }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" \
            bash -s -- "$DEPLOY_PATH" <<'REMOTE'
          set -euo pipefail
          cd "$1"
          if [ ! -f .env ]; then
            echo "[deploy-traefik] .env missing in $1; copy .env.traefik.example from the repo and set LETSENCRYPT_EMAIL." >&2
            exit 1
          fi
          docker compose -p chatterbox-traefik -f docker-compose.traefik.yml up -d
          docker image prune -f
          REMOTE
