services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatterbox}
      POSTGRES_USER: ${POSTGRES_USER:-chatterbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatterbox} -d ${POSTGRES_DB:-chatterbox}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:18-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-chatterbox}
      POSTGRES_USER: ${POSTGRES_USER:-chatterbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-0}
    volumes:
      - postgres-backups:/backups
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backup-sync:
    profiles: ["dropbox-sync"]
    image: rclone/rclone:1.74
    restart: unless-stopped
    depends_on:
      - postgres-backup
    environment:
      RCLONE_CONFIG_DROPBOX_TYPE: dropbox
      RCLONE_CONFIG_DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      RCLONE_CONFIG_DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
      RCLONE_CONFIG_DROPBOX_TOKEN: ${DROPBOX_TOKEN:-}
    volumes:
      - postgres-backups:/backups:ro
    networks:
      - internal
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        if [ -z "$$RCLONE_CONFIG_DROPBOX_CLIENT_ID" ] || [ -z "$$RCLONE_CONFIG_DROPBOX_CLIENT_SECRET" ] || [ -z "$$RCLONE_CONFIG_DROPBOX_TOKEN" ]; then
          echo "[backup-sync] DROPBOX_CLIENT_ID, DROPBOX_CLIENT_SECRET, and DROPBOX_TOKEN must all be set; see README." >&2
          exit 1
        fi
        while true; do
          echo "[backup-sync] starting sync at $$(date -Iseconds)"
          rclone sync /backups "dropbox:${DROPBOX_REMOTE_PATH:-chatterbox-backups}" \
            --transfers=2 --tpslimit=8 --log-level INFO \
            || echo "[backup-sync] sync failed with exit $$?"
          sleep ${BACKUP_SYNC_INTERVAL:-3600}
        done
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  chatterbox:
    image: chatterbox:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CHATTERBOX_DISCORD_TOKEN: ${CHATTERBOX_DISCORD_TOKEN:?CHATTERBOX_DISCORD_TOKEN must be set}
      CHATTERBOX_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chatterbox}
      CHATTERBOX_DB_USER: ${POSTGRES_USER:-chatterbox}
      CHATTERBOX_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      CHATTERBOX_DEV_MODE: ${CHATTERBOX_DEV_MODE:-false}
      CHATTERBOX_LOG_LEVEL: ${CHATTERBOX_LOG_LEVEL:-INFO}
      CHATTERBOX_HTTP_PORT: ${CHATTERBOX_HTTP_PORT:-8080}
      CHATTERBOX_SHORTENER_BASE_URL: ${CHATTERBOX_SHORTENER_BASE_URL:-}
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75.0
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK_NAME:-chatterbox-web}"
      - "chatterbox.stack=${TRAEFIK_ROUTER_NAME:-chatterbox}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-chatterbox}.rule=Host(`${SHORTENER_DOMAIN:?SHORTENER_DOMAIN must be set}`)${SHORTENER_PATH_PREFIX:+ && PathPrefix(`${SHORTENER_PATH_PREFIX}`)}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-chatterbox}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-chatterbox}.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-chatterbox}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${TRAEFIK_ROUTER_NAME:-chatterbox}.loadbalancer.server.port=${CHATTERBOX_HTTP_PORT:-8080}"
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${TRAEFIK_NETWORK_NAME:-chatterbox-web}"
      - "--providers.docker.constraints=Label(`chatterbox.stack`,`${TRAEFIK_ROUTER_NAME:-chatterbox}`)"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:?LETSENCRYPT_EMAIL must be set}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caserver=${LETSENCRYPT_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
  web:
    name: ${TRAEFIK_NETWORK_NAME:-chatterbox-web}
    driver: bridge

volumes:
  postgres-data:
  postgres-backups:
